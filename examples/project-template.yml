id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
name: "Basic Backend with Frontend"
version: "1.0.0"
description: "Creates a .NET backend and frontend with CI pipelines."
maintainers:
  - "Platform Team"

preScaffoldNotes:
  - |-
    Make sure your project name matches the naming convention agreed upon by the Platform Team.
    Use kebab-case (e.g. my-awesome-service).
  - "You will need at least Project Administrator permissions in the target project."

postScaffoldNotes:
  - |-
    Your repositories have been created and the CI pipelines are ready.
    The first pipeline run will be triggered automatically on the next commit to main.
  - |-
    Remember to configure your service connections and environment-specific variable
    groups before deploying to production.

parameters:
  - id: projectName
    label: "Project Name"
    hint: "A descriptive but technical name for your project (lowercase, no spaces)"
    type: string
    required: true
    validation:
      regex: "^[a-zA-Z][a-zA-Z0-9-]+$"
      message: "Letters, numbers, hyphens only. Must start with a letter."

  - id: teamName
    label: "Team Name"
    hint: "Name of the team responsible for this project"
    type: choice
    required: true
    options:
      - "Platform Team"
      - "Web Team"
      - "Mobile Team"
      - "Data Team"

  - id: includeBackend
    label: "Include Backend"
    hint: "Whether to initialize the backend repository and pipelines"
    type: boolean
    defaultValue: true

  - id: includeFrontend
    label: "Include Frontend"
    hint: "Whether to initialize the frontend repository and pipelines"
    type: boolean
    defaultValue: true

  - id: includeDocker
    label: "Include Docker Support"
    hint: "Whether to include Dockerfile"
    type: boolean
    defaultValue: false

repositories:
  - name: "{{projectName}}.backend"
    sourcePath: "templates/backend"
    defaultBranch: "main"
    when: "includeBackend"
    exclude:
      - path: "Dockerfile"
        when: "!includeDocker"

  - name: "{{projectName}}.frontend"
    sourcePath: "templates/frontend"
    defaultBranch: "main"
    when: "includeFrontend"

pipelines:
  - name: "{{projectName}}-backend-ci"
    repository: "{{projectName}}.backend"
    yamlPath: "pipelines/ci.yml"
    folder: "\\CI"
    when: "includeBackend"

  - name: "{{projectName}}-frontend-ci"
    repository: "{{projectName}}.frontend"
    yamlPath: "pipelines/ci.yml"
    folder: "\\CI"
    when: "includeFrontend"
