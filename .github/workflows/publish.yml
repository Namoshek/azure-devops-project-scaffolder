name: Publish to Marketplace

on:
  release:
    types: [created]

jobs:
  publish:
    name: Build & Publish Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package extension
        run: npx tfx extension create --manifest-globs vss-extension.json --override '{"version":"${{ steps.version.outputs.version }}"}'

      - name: Publish extension
        run: npx tfx extension publish --vsix 'namoshek.ado-project-scaffolder-${{ steps.version.outputs.version }}.vsix' --auth-type pat --token '${{ secrets.MARKETPLACE_TOKEN }}'
