id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
name: "Basic Backend with Frontend"
version: "1.0.0"
description: "Creates a .NET backend and frontend with CI pipelines."
templateCategories:
  - "Backend"
maintainers:
  - "Platform Team"

preScaffoldNotes:
  - |-
    Make sure your project name matches the naming convention agreed upon by the Platform Team.
    Use kebab-case (e.g. my-awesome-service).
  - "You will need at least Project Administrator permissions in the target project."

postScaffoldNotes:
  - |-
    Your repositories have been created and the CI pipelines are ready.
    The first pipeline run will be triggered automatically on the next commit to main.

parameters:
  - id: projectName
    label: "Project Name"
    hint: "A descriptive but technical name for your project (lowercase, no spaces)"
    type: string
    required: true
    validation:
      regex: "^[a-zA-Z][a-zA-Z0-9-]+$"
      message: "Letters, numbers, hyphens only. Must start with a letter."

  - id: teamName
    label: "Team Name"
    hint: "Name of the team responsible for this project"
    type: choice
    required: true
    options:
      - "Platform Team"
      - "Web Team"
      - "Mobile Team"
      - "Data Team"

  - id: includeBackend
    label: "Include Backend"
    hint: "Whether to initialize the backend repository and pipelines"
    type: boolean
    defaultValue: true

  - id: includeFrontend
    label: "Include Frontend"
    hint: "Whether to initialize the frontend repository and pipelines"
    type: boolean
    defaultValue: true

  - id: includeDocker
    label: "Include Docker Support"
    hint: "Whether to include Dockerfile"
    type: boolean
    defaultValue: false

  - id: dbConnectionString
    label: "Database Connection String"
    hint: "Passed to the backend pipeline as a secret variable"
    type: string
    secret: true
    when: "includeBackend"

  - id: azureTenantId
    label: "Azure Tenant ID"
    hint: "The Entra ID tenant to authenticate against (for the Azure service connection)"
    type: string
    when: "includeBackend"

  - id: azureClientId
    label: "Azure Service Principal Client ID"
    hint: "App registration client ID for the service principal"
    type: string
    when: "includeBackend"

  - id: azureClientSecret
    label: "Azure Service Principal Client Secret"
    hint: "App registration client secret — masked after submission"
    type: string
    secret: true
    when: "includeBackend"

  - id: azureSubscriptionId
    label: "Azure Subscription ID"
    hint: "The subscription to deploy resources to"
    type: string
    when: "includeBackend"

  - id: azureSubscriptionName
    label: "Azure Subscription Name"
    hint: "Display name for the subscription (informational only)"
    type: string
    when: "includeBackend"

repositories:
  - name: "{{projectName}}.backend"
    sourcePath: "templates/backend"
    defaultBranch: "main"
    when: "includeBackend"
    exclude:
      - path: "Dockerfile"
        when: "!includeDocker"

  - name: "{{projectName}}.frontend"
    sourcePath: "templates/frontend"
    defaultBranch: "main"
    when: "includeFrontend"

serviceConnections:
  - name: "{{projectName}}-azure"
    type: "AzureRM"
    authorizationScheme: "ServicePrincipal"
    url: "https://management.azure.com/"
    authorization:
      tenantid: "{{azureTenantId}}"
      serviceprincipalid: "{{azureClientId}}"
      serviceprincipalkey: "{{azureClientSecret}}"
    data:
      subscriptionId: "{{azureSubscriptionId}}"
      subscriptionName: "{{azureSubscriptionName}}"
      environment: "AzureCloud"
    description: "Azure service connection for {{projectName}} (created by scaffolder)"
    grantAccessToAllPipelines: true
    when: "includeBackend"

variableGroups:
  - name: "{{projectName}}-pipeline-vars"
    description: "Shared pipeline variables for {{projectName}}"
    grantAccessToAllPipelines: true
    when: "includeBackend"
    variables:
      - name: "PROJECT_NAME"
        value: "{{projectName}}"
      - name: "TEAM_NAME"
        value: "{{teamName}}"
      - name: "DB_CONNECTION_STRING"
        value: "{{dbConnectionString}}"
        secret: true
      - name: "AZURE_SUBSCRIPTION_ID"
        value: "{{azureSubscriptionId}}"

  - name: "{{projectName}}-docker-vars"
    description: "Docker-specific variables for {{projectName}}"
    grantAccessToAllPipelines: true
    when: "includeDocker"
    variables:
      - name: "DOCKER_IMAGE_NAME"
        value: "{{projectName}}"

pipelines:
  - name: "{{projectName}}-backend-ci"
    repository: "{{projectName}}.backend"
    yamlPath: "pipelines/build.yml"
    folder: "\\CI"
    when: "includeBackend"
    variables:
      - name: "PROJECT_NAME"
        value: "{{projectName}}"
      - name: "DB_CONNECTION_STRING"
        value: "{{dbConnectionString}}"
        secret: true

  - name: "{{projectName}}-frontend-ci"
    repository: "{{projectName}}.frontend"
    yamlPath: "pipelines/build.yml"
    folder: "\\CI"
    when: "includeFrontend"

# Expected folder structure of the repository containing this template:
#   project-template.yml
#   templates/
#     ├─ backend/
#     │  ├─ src/
#     │  │  ├─ backend.csproj
#     │  │  └─ ...
#     │  ├─ Dockerfile          ← excluded when includeDocker is false
#     │  └─ pipelines/
#     │       └─ build.yml
#     └─ frontend/
#        ├─ src/
#        │  ├─ index.html
#        │  ├─ app.js
#        │  └─ ...
#        └─ pipelines/
#             └─ build.yml
